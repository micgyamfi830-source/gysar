<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | GYSAR Global Holdings</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="assets/logo/logo-light.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(135deg, rgba(10,22,40,0.88) 0%, rgba(10,43,94,0.82) 50%, rgba(10,22,40,0.9) 100%), url('assets/images/hero-poster.jpg'); background-size: cover; background-position: center; padding: 40px 20px; }
    .error-code { font-size: 12rem; font-weight: 900; color: rgba(212,175,55,0.1); line-height: 1; margin-bottom: -30px; font-family: 'Poppins', sans-serif; }
    .error-page h1 { color: var(--white); font-size: 2.5rem; margin-bottom: 15px; }
    .error-page p { color: var(--silver); font-size: 1.1rem; max-width: 500px; margin: 0 auto 30px; }
    .error-page .btn-gold { display: inline-block; padding: 14px 35px; }
    .error-shield { font-size: 4rem; color: var(--gold); margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-shield"><i class="fas fa-shield-halved"></i></div>
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you are looking for might have been moved, deleted, or never existed. Let us help you find your way.</p>
      <a href="index.html" class="btn-gold"><i class="fas fa-home me-2"></i>Back to Home</a>
      <div class="mt-4"><a href="contact.html" class="text-gold text-decoration-none">Contact Support <i class="fas fa-arrow-right ms-1"></i></a></div>
    </div>
